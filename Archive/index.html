<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prehrajto Stahování</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="py-4 text-center border-bottom mb-4">
            <div class="d-flex align-items-center justify-content-center">
                <i class="fas fa-film text-primary me-3" style="font-size: 2rem;"></i>
                <h1 class="mb-0 text-primary">Prehrajto Stahování</h1>
            </div>
            <p class="text-muted mt-2">Vyhledávání a přehrávání filmů ze serveru prehrajto.cz</p>
        </header>

        <!-- Search Section -->
        <div class="row justify-content-center mb-5">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <!-- Search Input -->
                        <div class="input-group input-group-lg mb-3">
                            <input 
                                type="text" 
                                id="searchInput" 
                                class="form-control" 
                                placeholder="Zadejte název filmu nebo seriálu..." 
                                onkeypress="handleEnterPress(event)"
                            >
                            <button 
                                class="btn btn-primary" 
                                type="button" 
                                onclick="searchMovies()"
                                id="searchButton"
                            >
                                <i class="fas fa-search me-2"></i>Hledat
                            </button>
                        </div>
                        
                        <!-- Filters -->
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="languageFilter" class="form-label small">
                                    <i class="fas fa-language me-1"></i>Jazyk
                                </label>
                                <select id="languageFilter" class="form-select form-select-sm">
                                    <option value="preferred">⭐ Preferované (SK/CZ)</option>
                                    <option value="czech">🇨🇿 Čeština</option>
                                    <option value="slovak">🇸🇰 Slovenčina</option>
                                    <option value="english">🇺🇸 Angličtina</option>
                                    <option value="dubbed">🎬 Dabing</option>
                                    <option value="subtitled">📝 Titulky</option>
                                    <option value="all">🌍 Všechny jazyky</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="sizeSort" class="form-label small">
                                    <i class="fas fa-sort me-1"></i>Řazení podle velikosti
                                </label>
                                <select id="sizeSort" class="form-select form-select-sm">
                                    <option value="smart">🎯 Inteligentní (nejlepší nahoře)</option>
                                    <option value="largest">📈 Od největších</option>
                                    <option value="smallest">📉 Od nejmenších</option>
                                    <option value="middle">📊 Střední velikosti první</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Advanced Toggle -->
                        <div class="text-center mt-3">
                            <button 
                                class="btn btn-link btn-sm" 
                                type="button" 
                                onclick="toggleAdvancedFilters()"
                                id="advancedToggle"
                            >
                                <i class="fas fa-tags me-1"></i>Štítky a filtry
                            </button>
                        </div>
                        
                        <!-- Advanced Filters -->
                        <div id="advancedFilters" class="collapse mt-3">
                            <div class="border-top pt-3">
                                <div class="form-check mt-2">
                                    <input class="form-check-input" type="checkbox" id="hideMultipart" checked>
                                    <label class="form-check-label small" for="hideMultipart">
                                        Skrýt vícedílné soubory (CD1, CD2, Part1...)
                                    </label>
                                </div>
                                <div class="form-check mt-2">
                                    <input class="form-check-input" type="checkbox" id="showQualityTags" checked>
                                    <label class="form-check-label small" for="showQualityTags">
                                        Zobrazit štítky kvality (1080p, 720p...)
                                    </label>
                                </div>
                                <div class="form-check mt-2">
                                    <input class="form-check-input" type="checkbox" id="showSizeTags" checked>
                                    <label class="form-check-label small" for="showSizeTags">
                                        Zobrazit štítky velikosti souborů
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Načítá se...</span>
            </div>
            <p class="mt-3 text-muted">Vyhledávám filmy...</p>
        </div>

        <!-- Results Section -->
        <div id="results" class="row">
            <!-- Zde se zobrazí výsledky -->
        </div>

        <!-- Toast container pro notifikace -->
        <div id="toastContainer" style="position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px;">
            <!-- Zde se zobrazí toast notifikace -->
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
